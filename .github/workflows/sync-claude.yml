name: Sync Claude Code Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'commands/engineering/*.toml'
      - 'GEMINI.md'
      - '.github/workflows/sync-claude.yml'
      - 'scripts/sync-claude.mjs'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync-claude.mjs

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT
          git diff --staged --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/ CLAUDE.md
          git commit -m "chore: sync Claude Code plugin files from Gemini source of truth"
          git push
